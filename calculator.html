<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank & Density Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; font-size: 22px; color: #111; }
        h3 { font-size: 18px; color: #007bff; border-bottom: 2px solid #e9ecef; padding-bottom: 8px; margin-top: 25px; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 14px; color: #555;}
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background-color: #0056b3; }
        .result-box { margin-top: 15px; padding: 15px; background-color: #e9ecef; border-radius: 8px; text-align: center; display: none; }
        .result-value { font-size: 22px; font-weight: bold; color: #28a745; margin-top: 5px; }
        .sub-result { font-size: 14px; color: #666; margin-top: 8px; }
        .error { color: #dc3545; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Warehouse Tools</h2>
    
    <h3>1. Dip to Volume Converter</h3>
    
    <label>Select Tank</label>
    <select id="tankSelect">
        <option value="22kl" selected>22 KL Tank</option>
        <option value="16kl">16 KL Tank</option>
    </select>

    <label>Total Dip Reading (mm)</label>
    <input type="number" id="dipInput" placeholder="e.g. 450">

    <label>Water Dip Reading (mm) - Optional</label>
    <input type="number" id="waterInput" placeholder="e.g. 15" value="0">

    <button onclick="calculateVolume()">Calculate Volume</button>

    <div class="result-box" id="volResultBox">
        <div>Net Product Volume:</div>
        <div class="result-value" id="volResult">--</div>
        <div class="sub-result" id="waterResultText">--</div>
    </div>

    <h3>2. Density Correction (15°C)</h3>

    <label>Observed Density (kg/m³)</label>
    <input type="number" id="densityInput" placeholder="e.g. 830" step="0.1">

    <label>Detected Product</label>
    <select id="productSelect">
        <option value="diesel">Diesel (HSD)</option>
        <option value="petrol20">Petrol (20% Ethanol)</option>
    </select>

    <label>Current Temp (°C)</label>
    <input type="number" id="tempInput" placeholder="e.g. 25" step="0.1">

    <button onclick="calculateDensity()">Calculate Density</button>

    <div class="result-box" id="densityResultBox">
        <div>Density @ 15°C:</div>
        <div class="result-value" id="densityResult" style="color: #007bff;">--</div>
    </div>

</div>

<script>
    // PARTIAL ARRAYS: Need full chart data here.
    const tankData = {
        "16kl": [0, 4, 10, 19, 29, 40, 53, 66, 81, 97, 113], 
        "22kl": [0.0, 4.2, 11.8, 21.6, 33.3, 46.4, 61.0, 76.8, 93.8, 111.8, 130.9] 
    };

    const expansionCoeffs = {
        "diesel": 0.00083,
        "petrol20": 0.00120 
    };

    // Auto-Select Product Logic based on Density
    document.getElementById('densityInput').addEventListener('input', function() {
        const densityVal = parseFloat(this.value);
        const productDropdown = document.getElementById('productSelect');
        if (!isNaN(densityVal)) {
            productDropdown.value = densityVal < 800 ? 'petrol20' : 'diesel';
        }
    });

    // Reusable interpolation logic
    function calculateVolumeFromDip(dip, chart) {
        if (isNaN(dip) || dip < 0) return 0;
        const index = Math.floor(dip / 5);
        const remainder = dip % 5;

        if (index < chart.length - 1) {
            const vLower = chart[index];
            const vUpper = chart[index + 1];
            return vLower + ((vUpper - vLower) / 5) * remainder;
        } else if (index === chart.length - 1 && remainder === 0) {
            return chart[index];
        }
        return -1; 
    }

    // Workflow 1: Volume Calculation
    function calculateVolume() {
        const tank = document.getElementById("tankSelect").value;
        const totalDip = parseFloat(document.getElementById("dipInput").value);
        let waterDip = parseFloat(document.getElementById("waterInput").value);
        if (isNaN(waterDip)) waterDip = 0;

        const chart = tankData[tank];
        const volResultBox = document.getElementById("volResultBox");
        const volResultEl = document.getElementById("volResult");
        const waterResultEl = document.getElementById("waterResultText");

        if (waterDip > totalDip) {
            volResultEl.innerHTML = '<span class="error">Error: Water > Total Dip</span>';
            waterResultEl.innerText = "";
            volResultBox.style.display = "block";
            return;
        }

        const totalVolume = calculateVolumeFromDip(totalDip, chart);
        const waterVolume = calculateVolumeFromDip(waterDip, chart);

        if (totalVolume === -1 || waterVolume === -1) {
            volResultEl.innerHTML = '<span class="error">Dip exceeds chart</span>';
            waterResultEl.innerText = "";
        } else {
            const netProductVolume = totalVolume - waterVolume;
            volResultEl.innerText = netProductVolume.toFixed(2) + " Ltrs";
            waterResultEl.innerText = "Total Vol: " + totalVolume.toFixed(2) + "L | Water: " + waterVolume.toFixed(2) + "L";
            volResultEl.classList.remove("error");
        }
        volResultBox.style.display = "block";
    }

    // Workflow 2: Density Calculation
    function calculateDensity() {
        const product = document.getElementById("productSelect").value;
        const temp = parseFloat(document.getElementById("tempInput").value);
        const obsDensity = parseFloat(document.getElementById("densityInput").value);
        const densityResultBox = document.getElementById("densityResultBox");
        const densityResultEl = document.getElementById("densityResult");

        if (!isNaN(temp) && !isNaN(obsDensity)) {
            const alpha = expansionCoeffs[product];
            const correctedDensity = obsDensity * (1 + alpha * (temp - 15));
            densityResultEl.innerText = correctedDensity.toFixed(2) + " kg/m³";
            densityResultBox.style.display = "block";
        } else {
            densityResultEl.innerHTML = '<span class="error">Enter all values</span>';
            densityResultBox.style.display = "block";
        }
    }
</script>

</body>
</html>
